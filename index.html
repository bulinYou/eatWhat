<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #357abd;
            --background-color: #f0f2f5;
            --chat-bg: white;
            --text-color: #333;
            --user-message-bg: #e3f2fd;
            --bot-message-bg: #f1f1f1;
            --border-color: #e0e0e0;
            --input-border: #ddd;
            --typing-dot: #999;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        
        .dark-mode {
            --primary-color: #64b5f6;
            --secondary-color: #42a5f5;
            --background-color: #121212;
            --chat-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --user-message-bg: #2c3e50;
            --bot-message-bg: #252525;
            --border-color: #333;
            --input-border: #444;
            --typing-dot: #777;
        }
        
        .chat-container {
            max-width: 800px;
            margin: 20px auto;
            background-color: var(--chat-bg);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: background-color 0.3s;
        }
        
        .chat-header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }
        
        .theme-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background-color 0.3s;
        }
        
        .theme-toggle:hover {
            background-color: rgba(255,255,255,0.2);
        }
        
        .chat-messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: var(--input-border);
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 70%;
            animation: messageSlide 0.3s ease-out;
            line-height: 1.4;
        }
        
        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-message {
            background-color: var(--user-message-bg);
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background-color: var(--bot-message-bg);
            align-self: flex-start;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        
        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid var(--border-color);
            background-color: var(--chat-bg);
            transition: background-color 0.3s, border-color 0.3s;
        }
        
        #message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--input-border);
            border-radius: 24px;
            font-size: 16px;
            resize: none;
            background-color: var(--chat-bg);
            color: var(--text-color);
            transition: all 0.3s;
        }
        
        #message-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }
        
        #send-button {
            margin-left: 10px;
            padding: 0 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #send-button:hover {
            background-color: var(--secondary-color);
            transform: translateY(-1px);
        }
        
        #send-button:disabled {
            background-color: #a0c4f1;
            cursor: not-allowed;
            transform: none;
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background-color: var(--bot-message-bg);
            border-radius: 18px;
            max-width: 70%;
            animation: messageSlide 0.3s ease-out;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: var(--typing-dot);
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out both;
        }
        
        .typing-dot:nth-child(1) {
            animation-delay: -0.32s;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: -0.16s;
        }
        
        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .chat-container {
                margin: 0;
                border-radius: 0;
                height: 100vh;
            }
            
            .chat-messages {
                height: calc(100vh - 120px);
            }
            
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            对话助手
            <button class="theme-toggle" id="theme-toggle">🌙</button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                你好！我是你的对话助手，有什么可以帮助你的吗？
            </div>
        </div>
        <div class="chat-input">
            <textarea id="message-input" placeholder="请输入消息..." rows="1"></textarea>
            <button id="send-button">发送</button>
        </div>
    </div>
    
    <script>
        // API配置
        const API_CONFIG = {
            // 本地后端服务器地址
            endpoint: 'http://localhost:5000/api/chat',
            // 模型名称，根据阿里云提供的模型修改
            model: 'ep-20240418145642-8r45f'
        };
        
        // DOM元素
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        
        // 消息历史
        let messageHistory = [
            {
                role: 'system',
                content: '你是一个对话助手，帮助用户回答问题。'
            }
        ];
        
        // 发送消息函数
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // 添加用户消息到界面
            addMessage('user', message);
            messageInput.value = '';
            
            // 禁用发送按钮
            sendButton.disabled = true;
            
            // 显示正在输入状态
            const typingIndicator = addTypingIndicator();
            
            // 添加用户消息到历史
            messageHistory.push({ role: 'user', content: message });
            
            try {
                // 调用本地后端API
                const response = await fetch(API_CONFIG.endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        messages: messageHistory
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status} ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                const botResponse = data.choices[0].message.content;
                
                // 移除正在输入状态
                typingIndicator.remove();
                
                // 添加机器人回复到界面
                addMessage('bot', botResponse);
                
                // 添加机器人回复到历史
                messageHistory.push({ role: 'assistant', content: botResponse });
                
            } catch (error) {
                console.error('错误:', error);
                // 移除正在输入状态
                typingIndicator.remove();
                // 添加错误消息到界面
                addMessage('bot', `抱歉，发生错误: ${error.message}`);
            } finally {
                // 启用发送按钮
                sendButton.disabled = false;
            }
        }
        
        // 添加消息到界面
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
            messageDiv.textContent = content;
            chatMessages.appendChild(messageDiv);
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 添加正在输入状态
        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatMessages.appendChild(typingDiv);
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return typingDiv;
        }
        
        // 事件监听器
        sendButton.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // 自动调整输入框高度
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        // 主题切换功能
        const themeToggle = document.getElementById('theme-toggle');
        
        // 检查本地存储中的主题设置
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.textContent = '☀️';
        }
        
        themeToggle.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            
            if (document.body.classList.contains('dark-mode')) {
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
