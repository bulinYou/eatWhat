<!DOCTYPE html>

<html lang="zh"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>健康食志 - 日志</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --background: #f8faf8;
            --surface: #f8faf8;
            --surface-container-lowest: #ffffff;
            --surface-container-low: #f2f4f2;
            --surface-container: #eceeec;
            --surface-container-high: #e6e9e7;
            --surface-container-highest: #e1e3e1;
            --primary: #396a05;
            --primary-container: #88c057;
            --primary-fixed: #b8f484;
            --on-primary: #ffffff;
            --on-primary-container: #264c00;
            --on-primary-fixed: #0d2000;
            --secondary: #8f4e00;
            --secondary-container: #fc9d41;
            --on-secondary: #ffffff;
            --on-surface: #191c1b;
            --on-surface-variant: #42493a;
            --outline-variant: #c2c9b6;
            --error: #ba1a1a;
            --radius-default: 0.75rem;
            --radius-lg: 1.5rem;
            --radius-xl: 2.5rem;
            --radius-full: 9999px;
            --font-headline: 'Manrope', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background: #111410;
                --surface: #111410;
                --surface-container-lowest: #0c0f0a;
                --surface-container-high: #21251e;
                --on-surface: #e1e3e1;
                --on-surface-variant: #c2c9b6;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--background);
            color: var(--on-surface);
            font-family: var(--font-body);
            line-height: 1.4;
            min-height: 100dvh;
            padding-bottom: 6.5rem;
            font-size: 0.9375rem;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
            display: inline-block;
            vertical-align: middle;
        }

        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }

        /* Header Styles */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: var(--background);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.25rem;
        }

        .user-profile {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: var(--radius-full);
            overflow: hidden;
            border: 2px solid var(--primary-container);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .user-profile:active {
            transform: scale(0.95);
        }

        .user-profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-title {
            font-family: var(--font-headline);
            font-weight: 800;
            color: var(--primary);
            font-size: 1.25rem;
            letter-spacing: -0.025em;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--primary);
            padding: 0.4rem;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        /* Main Content Layout */
        .container {
            max-width: 42rem;
            margin: 0 auto;
            padding: 0.5rem 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Calorie Card */
        .calorie-card {
            background-color: var(--surface-container-lowest);
            border-radius: var(--radius-default);
            padding: 1.25rem 1.5rem;
            box-shadow: 0 8px 24px rgba(25, 28, 27, 0.05);
            position: relative;
            overflow: hidden;
        }

        .calorie-card-label {
            color: var(--on-surface-variant);
            font-weight: 600;
            letter-spacing: 0.02em;
            font-size: 0.8125rem;
            text-transform: uppercase;
        }

        .calorie-main {
            margin-top: 0.25rem;
            display: flex;
            align-items: baseline;
            gap: 0.35rem;
        }

        .calorie-current {
            font-family: var(--font-headline);
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--on-surface);
        }

        .calorie-total {
            color: var(--on-surface-variant);
            font-size: 1.125rem;
            font-weight: 500;
        }

        .progress-bar {
            margin-top: 1.25rem;
            height: 0.75rem;
            width: 100%;
            background-color: var(--surface-container-high);
            border-radius: var(--radius-full);
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--primary-container));
            border-radius: var(--radius-full);
            transition: width 0.5s ease-out;
        }

        .macros-grid {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
        }

        .macro-item {
            display: flex;
            flex-direction: column;
        }

        .macro-item.border-x {
            border-left: 1px solid rgba(114, 121, 105, 0.1);
            border-right: 1px solid rgba(114, 121, 105, 0.1);
            padding: 0 1.5rem;
        }

        .macro-label {
            font-size: 0.7rem;
            color: var(--on-surface-variant);
            font-weight: 600;
        }

        .macro-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--on-surface);
        }

        .decorative-blur {
            position: absolute;
            top: -2rem;
            right: -2rem;
            width: 10rem;
            height: 10rem;
            background-color: rgba(57, 106, 5, 0.04);
            border-radius: var(--radius-full);
            filter: blur(40px);
        }

        /* Chips */
        .chips-container {
            display: flex;
            gap: 0.4rem;
            overflow-x: auto;
            padding-bottom: 0.25rem;
        }

        .chips-container::-webkit-scrollbar { display: none; }
        .chips-container { -ms-overflow-style: none; scrollbar-width: none; }

        .chip {
            background-color: var(--primary-fixed);
            color: var(--on-primary-fixed);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: var(--radius-full);
            font-size: 0.8125rem;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* Food List Waterfall */
        .section-title {
            font-family: var(--font-headline);
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--on-surface);
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .waterfall {
            columns: 2;
            column-gap: 0.75rem;
        }

        .waterfall-item {
            break-inside: avoid;
            margin-bottom: 0.75rem;
            background-color: var(--surface-container-lowest);
            border-radius: var(--radius-default);
            overflow: hidden;
            border: 1px solid rgba(194, 201, 182, 0.1);
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }

        .waterfall-image-container {
            position: relative;
        }

        .aspect-4-5 { aspect-ratio: 4/5; }
        .aspect-square { aspect-ratio: 1/1; }
        .aspect-3-4 { aspect-ratio: 3/4; }

        .waterfall-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
        }

        .image-content {
            position: absolute;
            bottom: 0.75rem;
            left: 0.75rem;
            color: white;
        }

        .food-name { font-weight: 700; font-size: 1rem; line-height: 1.1; }
        .food-cal { font-size: 0.75rem; font-weight: 500; opacity: 0.9; }

        .card-p-5 { padding: 0.875rem; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .card-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon .material-symbols-outlined { font-size: 20px; }

        .bg-secondary-container { background-color: var(--secondary-container); color: var(--on-secondary); }
        .bg-primary-fixed { background-color: var(--primary-fixed); color: var(--on-primary-fixed); }

        .card-time { color: var(--on-surface-variant); font-weight: 700; font-size: 0.75rem; }
        .card-name { font-weight: 700; font-size: 1rem; color: var(--on-surface); }
        .card-cal { color: var(--primary); font-weight: 600; font-size: 0.8125rem; }

        /* Bottom Input Bar */
        .bottom-input-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background-color: rgba(248, 250, 248, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0.75rem 1.25rem calc(0.75rem + env(safe-area-inset-bottom, 0.75rem));
            border-top: 1px solid rgba(194, 201, 182, 0.15);
            box-shadow: 0 -8px 30px rgba(25, 28, 27, 0.06);
        }

        @media (prefers-color-scheme: dark) {
            .bottom-input-nav { 
                background-color: rgba(12, 15, 10, 0.85); 
            }
        }

        .input-container {
            background-color: var(--surface-container-high);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            padding: 0.3rem;
            max-width: 42rem;
            margin: 0 auto;
        }

        .input-controls {
            display: flex;
            background-color: var(--surface-container-lowest);
            border-radius: var(--radius-full);
            padding: 0.15rem;
            gap: 1px;
        }

        .mic-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-container));
            color: white;
            padding: 0.45rem;
            border-radius: var(--radius-full);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .keyboard-btn {
            background: none;
            border: none;
            color: var(--on-surface-variant);
            padding: 0.45rem;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-input {
            background: transparent;
            border: none;
            flex-grow: 1;
            padding: 0 0.6rem;
            color: var(--on-surface);
            font-weight: 500;
            outline: none;
            font-size: 0.9375rem;
        }

        .main-input::placeholder {
            color: rgba(66, 73, 58, 0.5);
        }

        .search-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            width: 2.25rem;
            height: 2.25rem;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(57, 106, 5, 0.25);
        }

        .search-btn span { font-size: 18px; }

    </style>
</head>
